<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Eric & Maria — Wedding Website</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="hearts-container" id="hearts-container"></div>

  <header>
    <nav class="nav">
      <div class="nav-brand">Eric &amp; Maria</div>
      <div class="nav-links">
        <a href="#our-story">Our Story</a>
        <a href="#rsvp">RSVP</a>
        <a href="#messages">Messages</a>
      </div>
    </nav>
  </header>

  <main>
    <section id="our-story">
      <div class="hero fade-in visible">
        <div class="hero-content">
          <h2>Eric &amp; Maria</h2>
          <h1>We're Getting Married!</h1>
          <p class="hero-date">September 25, 2027 — Grandview, Washington</p>
        </div>
        <div class="hero-image-wrapper">
          <img id="hero-our-story" class="hero-image" src="" alt="Hero" />
          <div class="hero-tag">Our Story</div>
        </div>
      </div>

      <div class="two-column fade-in visible">
        <div class="story-card">
          <h3>How We Met</h3>
          <p>Your story content will go here. For now, we are making sure the layout stays solid while we wait for your photos!</p>
        </div>
        <div class="story-image-wrapper">
          <img id="img-how-we-met" src="" alt="How we met" />
        </div>
      </div>
    </section>

    <div class="section-divider"></div>

    <section id="rsvp" class="fade-in visible">
      <h2 class="section-title">RSVP</h2>
      <form action="https://formspree.io/f/your-form-id" method="POST" class="rsvp-form">
        <input type="hidden" name="_next" value="https://cts-gv.github.io/wedding-announcement/thank-you.html">
        <input type="text" name="name" placeholder="Full Name" required />
        <input type="email" name="email" placeholder="Email" required />
        <select name="attending" required>
          <option value="">Will you attend?</option>
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>
        <button type="submit" id="rsvp-submit">Submit RSVP</button>
      </form>
    </section>

    <div class="section-divider"></div>

    <section id="messages" class="fade-in visible">
      <h2 class="section-title">Guestbook</h2>
      <form action="https://formspree.io/f/your-form-id" method="POST" class="rsvp-form">
        <input type="hidden" name="_next" value="https://cts-gv.github.io/wedding-announcement/thank-you.html">
        <input type="text" name="guest_name" placeholder="Name" required />
        <textarea name="message" placeholder="Your message..." required></textarea>
        <button type="submit" id="rsvp-submit">Send Message</button>
      </form>
    </section>

    <footer><p>Eric &amp; Maria — 2027</p></footer>
  </main>

  <script src="js/script.js"></script>
</body>
</html>
